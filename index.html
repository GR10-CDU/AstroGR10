    :root {
        --black: #000000;
        --card: #1c1c1e;
        --card2: #2c2c2e;
        --gray1: #8e8e93;
        --gray2: #636366;
        --gray3: #48484a;
        --white: #ffffff;
        --blue: #0a84ff;
        --green: #30d158;
        --orange: #ff9f0a;
        --red: #ff453a;
        --purple: #bf5af2;
        --safe-top: env(safe-area-inset-top);
        --safe-bottom: env(safe-area-inset-bottom);
    }
    
    html, body {
        background: var(--black);
        color: var(--white);
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
        font-size: 17px;
        line-height: 1.4;
        min-height: 100vh;
        min-height: -webkit-fill-available;
    }
    
    .app {
        padding: 16px;
        padding-top: calc(16px + var(--safe-top));
        padding-bottom: calc(80px + var(--safe-bottom));
        max-width: 500px;
        margin: 0 auto;
    }
    
    /* Header */
    .header {
        margin-bottom: 24px;
    }
    
    .header-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
    }
    
    .logo {
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.5px;
    }
    
    .time {
        font-size: 15px;
        color: var(--gray1);
        font-variant-numeric: tabular-nums;
    }
    
    .location {
        font-size: 13px;
        color: var(--gray2);
    }
    
    /* Pills */
    .pills {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding: 4px 0;
        margin: 0 -16px;
        padding-left: 16px;
        padding-right: 16px;
        scrollbar-width: none;
        -ms-overflow-style: none;
    }
    
    .pills::-webkit-scrollbar { display: none; }
    
    .pill {
        background: var(--card);
        border: none;
        color: var(--gray1);
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 15px;
        font-weight: 500;
        white-space: nowrap;
        cursor: pointer;
        transition: all 0.2s;
    }
    
    .pill.active {
        background: var(--white);
        color: var(--black);
    }
    
    /* Count */
    .count {
        font-size: 13px;
        color: var(--gray2);
        margin: 20px 0 12px;
    }
    
    /* Cards */
    .cards {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }
    
    .card {
        background: var(--card);
        border-radius: 16px;
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.2s, opacity 0.2s;
    }
    
    .card:active {
        transform: scale(0.98);
        opacity: 0.9;
    }
    
    .card-img {
        width: 100%;
        height: 140px;
        object-fit: cover;
        background: var(--card2);
    }
    
    .card-body {
        padding: 14px 16px 16px;
    }
    
    .card-row1 {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 6px;
    }
    
    .card-name {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.3px;
    }
    
    .card-type {
        font-size: 12px;
        font-weight: 500;
        padding: 4px 8px;
        border-radius: 6px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
    }
    
    .type-planeta { background: rgba(255,159,10,0.2); color: var(--orange); }
    .type-nebulosa { background: rgba(191,90,242,0.2); color: var(--purple); }
    .type-galaxia { background: rgba(10,132,255,0.2); color: var(--blue); }
    .type-cumulo { background: rgba(48,209,88,0.2); color: var(--green); }
    .type-estrella { background: rgba(255,69,58,0.2); color: var(--red); }
    
    .card-cat {
        font-size: 14px;
        color: var(--gray1);
        margin-bottom: 12px;
    }
    
    .card-row2 {
        display: flex;
        gap: 16px;
        font-size: 14px;
        color: var(--gray2);
        margin-bottom: 14px;
    }
    
    .card-status {
        display: flex;
        align-items: center;
        gap: 8px;
        padding-top: 12px;
        border-top: 1px solid var(--gray3);
    }
    
    .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
    }
    
    .status-visible .status-dot {
        background: var(--green);
        box-shadow: 0 0 8px var(--green);
    }
    
    .status-tonight .status-dot {
        background: var(--orange);
    }
    
    .status-no .status-dot {
        background: var(--gray3);
    }
    
    .status-text {
        font-size: 14px;
        font-weight: 500;
    }
    
    .status-visible .status-text { color: var(--green); }
    .status-tonight .status-text { color: var(--orange); }
    .status-no .status-text { color: var(--gray2); }
    
    .status-time {
        margin-left: auto;
        font-size: 13px;
        color: var(--gray2);
        font-variant-numeric: tabular-nums;
    }
    
    /* Empty */
    .empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--gray2);
    }
    
    .empty-icon {
        font-size: 48px;
        margin-bottom: 16px;
        opacity: 0.5;
    }
    
    /* Modal */
    .modal {
        position: fixed;
        inset: 0;
        background: var(--black);
        z-index: 100;
        overflow-y: auto;
        display: none;
        opacity: 0;
        transition: opacity 0.3s;
    }
    
    .modal.open {
        display: block;
        opacity: 1;
    }
    
    .modal-img {
        width: 100%;
        height: 280px;
        object-fit: cover;
        background: var(--card);
    }
    
    .modal-close {
        position: absolute;
        top: calc(16px + var(--safe-top));
        right: 16px;
        width: 32px;
        height: 32px;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: none;
        border-radius: 50%;
        color: var(--white);
        font-size: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .modal-body {
        padding: 20px 16px;
        padding-bottom: calc(40px + var(--safe-bottom));
    }
    
    .modal-header {
        margin-bottom: 24px;
    }
    
    .modal-name {
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.5px;
        margin-bottom: 4px;
    }
    
    .modal-cat {
        font-size: 15px;
        color: var(--gray1);
    }
    
    .info-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin-bottom: 28px;
    }
    
    .info-box {
        background: var(--card);
        padding: 14px;
        border-radius: 12px;
    }
    
    .info-label {
        font-size: 12px;
        color: var(--gray2);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
    }
    
    .info-value {
        font-size: 17px;
        font-weight: 500;
    }
    
    .section {
        margin-bottom: 28px;
    }
    
    .section-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--gray2);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 12px;
    }
    
    .section-text {
        font-size: 16px;
        line-height: 1.6;
        color: var(--white);
    }
    
    .tips-box {
        background: var(--card);
        border-radius: 12px;
        overflow: hidden;
    }
    
    .tip {
        padding: 14px 16px;
        font-size: 15px;
        line-height: 1.5;
        border-bottom: 1px solid var(--gray3);
        display: flex;
        gap: 12px;
    }
    
    .tip:last-child { border-bottom: none; }
    
    .tip-icon {
        color: var(--blue);
        font-size: 14px;
        margin-top: 2px;
    }
    
    .facts-grid {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    
    .fact {
        background: var(--card);
        padding: 12px 14px;
        border-radius: 10px;
        font-size: 14px;
        color: var(--gray1);
        line-height: 1.5;
    }
    
    /* Footer nav */
    .nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(28,28,30,0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid var(--gray3);
        padding: 12px 20px;
        padding-bottom: calc(12px + var(--safe-bottom));
        display: flex;
        justify-content: space-around;
    }
    
    .nav-btn {
        background: none;
        border: none;
        color: var(--gray2);
        font-size: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        cursor: pointer;
    }
    
    .nav-btn.active { color: var(--blue); }
    
    .nav-icon { font-size: 24px; }
</style>

];

let lat=-32.48,lon=-58.23,filter='visible';

function toRad(d){return d*Math.PI/180}
function toDeg(r){return r*180/Math.PI}
function getJD(d=new Date()){const y=d.getUTCFullYear(),m=d.getUTCMonth()+1,day=d.getUTCDate()+d.getUTCHours()/24+d.getUTCMinutes()/1440;let Y=y,M=m;if(M<=2){Y--;M+=12}const A=Math.floor(Y/100),B=2-A+Math.floor(A/4);return Math.floor(365.25*(Y+4716))+Math.floor(30.6001*(M+1))+day+B-1524.5}
function getLST(d,lng){const jd=getJD(d),T=(jd-2451545)/36525;let g=280.46061837+360.98564736629*(jd-2451545)+0.000387933*T*T;return((g%360+360)%360+lng+360)%360}
function getAlt(ra,dec,d=new Date()){const lst=getLST(d,lon),ha=((lst-ra*15)%360+360)%360-(lst-ra*15>180?360:0);return toDeg(Math.asin(Math.sin(toRad(dec))*Math.sin(toRad(lat))+Math.cos(toRad(dec))*Math.cos(toRad(lat))*Math.cos(toRad(ha))))}
function isVis(o,d=new Date()){if(o.ra===null)return d.getHours()>=20||d.getHours()<=5;return getAlt(o.ra,o.dec,d)>(o.minA||15)}
function getVis(o){const now=new Date(),gm=o.mo.includes(now.getMonth()+1),vn=isVis(o,now);let ba=-90,bh=0;for(let h=18;h<=30;h++){const t=new Date(now);t.setHours(h%24,0,0,0);if(h>=24)t.setDate(t.getDate()+1);const a=o.ra===null?45:getAlt(o.ra,o.dec,t);if(a>ba){ba=a;bh=h%24}}let sh=null,eh=null;for(let h=18;h<=30;h++){const t=new Date(now);t.setHours(h%24,0,0,0);if(h>=24)t.setDate(t.getDate()+1);if(o.ra===null||getAlt(o.ra,o.dec,t)>(o.minA||15)){if(sh===null)sh=h%24;eh=h%24}}const rg=sh!==null?`${String(sh).padStart(2,'0')}:00-${String((eh+1)%24).padStart(2,'0')}:00`:'—';return{vn,gm,bh,ba:Math.round(ba),rg,sc:vn?3:(gm&&ba>20?2:(ba>0?1:0))}}

function render(){
    const c=document.getElementById('cards');
    let list=DATA.map(o=>({...o,v:getVis(o)}));
    if(filter==='visible')list=list.filter(o=>o.v.vn);
    else if(filter!=='all')list=list.filter(o=>o.t===filter);
    list.sort((a,b)=>b.v.sc-a.v.sc||a.mag-b.mag);
    document.getElementById('count').textContent=`${list.length} objeto${list.length!==1?'s':''}`;
    if(!list.length){c.innerHTML=`<div class="empty"><div class="empty-icon">🌙</div>No hay objetos visibles ahora.<br>Probá "Todos" o esperá que oscurezca.</div>`;return}
    c.innerHTML=list.map(o=>`
        <div class="card" onclick="openM('${o.id}')">
            <img class="card-img" src="${o.img}" loading="lazy" onerror="this.style.background='#2c2c2e'">
            <div class="card-body">
                <div class="card-row1">
                    <div class="card-name">${o.n}</div>
                    <span class="card-type type-${o.t}">${o.t}</span>
                </div>
                <div class="card-cat">${o.cat} · ${o.con}</div>
                <div class="card-row2">
                    <span>✨ ${o.mag}</span>
                    <span>📏 ${o.dist}</span>
                </div>
                <div class="card-status status-${o.v.vn?'visible':(o.v.sc>=2?'tonight':'no')}">
                    <span class="status-dot"></span>
                    <span class="status-text">${o.v.vn?'Visible ahora':(o.v.sc>=2?'Esta noche':'No visible')}</span>
                    <span class="status-time">${o.v.bh}:00 · ${o.v.ba}°</span>
                </div>
            </div>
        </div>
    `).join('')}

function openM(id){
    const o=DATA.find(x=>x.id===id);if(!o)return;
    const v=getVis(o);
    document.getElementById('mImg').src=o.img;
    document.getElementById('mBody').innerHTML=`
        <div class="modal-header">
            <div class="modal-name">${o.n}</div>
            <div class="modal-cat">${o.cat} · ${o.con}</div>
        </div>
        <div class="info-grid">
            <div class="info-box"><div class="info-label">Magnitud</div><div class="info-value">${o.mag}</div></div>
            <div class="info-box"><div class="info-label">Distancia</div><div class="info-value">${o.dist}</div></div>
            <div class="info-box"><div class="info-label">Tamaño</div><div class="info-value">${o.sz}</div></div>
            <div class="info-box"><div class="info-label">Mejor hora</div><div class="info-value">${v.bh}:00</div></div>
            <div class="info-box"><div class="info-label">Altitud máx</div><div class="info-value">${v.ba}°</div></div>
            <div class="info-box"><div class="info-label">Visible</div><div class="info-value">${v.rg}</div></div>
        </div>
        <div class="section">
            <div class="section-title">Descripción</div>
            <div class="section-text">${o.desc}</div>
        </div>
        <div class="section">
            <div class="section-title">Tips Celestron 127</div>
            <div class="tips-box">${o.tips.map(t=>`<div class="tip"><span class="tip-icon">→</span>${t}</div>`).join('')}</div>
        </div>
        <div class="section">
            <div class="section-title">Datos curiosos</div>
            <div class="facts-grid">${o.facts.map(f=>`<div class="fact">${f}</div>`).join('')}</div>
        </div>
    `;
    document.getElementById('modal').classList.add('open');
    document.body.style.overflow='hidden'}

function closeModal(){document.getElementById('modal').classList.remove('open');document.body.style.overflow=''}

function setFilter(f){
    filter=f;
    document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.f===f));
    document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===(f==='visible'?0:1)));
    render()}

document.getElementById('pills').onclick=e=>{if(e.target.classList.contains('pill'))setFilter(e.target.dataset.f)}

function getLoc(){
    document.getElementById('loc').textContent='📍 Obteniendo...';
    navigator.geolocation?.getCurrentPosition(p=>{
        lat=p.coords.latitude;lon=p.coords.longitude;
        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`).then(r=>r.json()).then(d=>{
            document.getElementById('loc').textContent=`📍 ${d.address?.city||d.address?.town||'Tu ubicación'}`
        }).catch(()=>document.getElementById('loc').textContent=`📍 ${lat.toFixed(1)}°, ${lon.toFixed(1)}°`);
        render()
    },()=>{document.getElementById('loc').textContent='📍 C. del Uruguay';render()})}

function updateTime(){document.getElementById('time').textContent=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}

document.addEventListener('DOMContentLoaded',()=>{getLoc();updateTime();setInterval(updateTime,60000)});
document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeModal()};
document.onkeydown=e=>{if(e.key==='Escape')closeModal()};
</script>
