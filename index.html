    :root {
        --bg: #000000;
        --bg2: #0a0a0a;
        --bg3: #111111;
        --card: #0d0d0d;
        --border: #1a1a1a;
        --text: #ffffff;
        --text2: #888888;
        --text3: #555555;
        --blue: #3b82f6;
        --green: #22c55e;
        --orange: #f59e0b;
        --red: #ef4444;
        --purple: #a855f7;
    }
    
    body {
        font-family: 'Inter', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        font-size: 16px;
        line-height: 1.5;
        min-height: 100vh;
    }
    
    .app {
        max-width: 800px;
        margin: 0 auto;
        padding: 16px;
    }
    
    /* Header */
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-bottom: 16px;
    }
    
    .logo {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--blue);
    }
    
    .location {
        font-size: 0.9rem;
        color: var(--text2);
        margin-top: 4px;
    }
    
    .time {
        font-size: 1.1rem;
        font-weight: 600;
    }
    
    .btn {
        background: var(--bg3);
        border: 1px solid var(--border);
        color: var(--text2);
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 0.9rem;
        cursor: pointer;
        margin-top: 8px;
    }
    
    .btn:active { background: var(--border); }
    
    /* Filtros */
    .filters {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
        overflow-x: auto;
        padding-bottom: 8px;
    }
    
    .filter {
        background: var(--bg2);
        border: 1px solid var(--border);
        color: var(--text2);
        padding: 10px 16px;
        border-radius: 24px;
        font-size: 0.95rem;
        cursor: pointer;
        white-space: nowrap;
    }
    
    .filter.active {
        background: var(--blue);
        border-color: var(--blue);
        color: white;
    }
    
    /* Info */
    .info-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        color: var(--text2);
        font-size: 0.95rem;
    }
    
    .sort {
        background: var(--bg2);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 0.9rem;
    }
    
    /* Grid */
    .grid {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }
    
    /* Card */
    .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        cursor: pointer;
    }
    
    .card:active { border-color: var(--blue); }
    
    .card-img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        background: var(--bg3);
    }
    
    .card-body { padding: 16px; }
    
    .card-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 8px;
    }
    
    .card-name {
        font-size: 1.25rem;
        font-weight: 600;
    }
    
    .card-cat {
        font-size: 0.85rem;
        color: var(--blue);
        margin-top: 2px;
    }
    
    .badge {
        font-size: 0.75rem;
        padding: 4px 10px;
        border-radius: 6px;
        font-weight: 500;
        background: rgba(255,255,255,0.05);
        color: var(--text2);
    }
    
    .badge-planeta { background: rgba(245,158,11,0.15); color: var(--orange); }
    .badge-nebulosa { background: rgba(168,85,247,0.15); color: var(--purple); }
    .badge-galaxia { background: rgba(59,130,246,0.15); color: var(--blue); }
    .badge-cumulo { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-estrella { background: rgba(239,68,68,0.15); color: var(--red); }
    
    .card-meta {
        display: flex;
        gap: 16px;
        font-size: 0.9rem;
        color: var(--text2);
        margin-bottom: 12px;
    }
    
    .card-foot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 12px;
        border-top: 1px solid var(--border);
    }
    
    .vis {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.95rem;
        font-weight: 500;
    }
    
    .vis-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
    }
    
    .vis.yes { color: var(--green); }
    .vis.yes .vis-dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
    
    .vis.soon { color: var(--orange); }
    .vis.soon .vis-dot { background: var(--orange); }
    
    .vis.no { color: var(--text3); }
    .vis.no .vis-dot { background: var(--text3); }
    
    .card-time {
        font-size: 0.85rem;
        color: var(--text3);
        margin-top: 8px;
    }
    
    .diff {
        display: flex;
        gap: 3px;
    }
    
    .diff span {
        width: 4px;
        height: 14px;
        background: var(--border);
        border-radius: 2px;
    }
    
    .diff.d1 span:nth-child(1) { background: var(--green); }
    .diff.d2 span:nth-child(1), .diff.d2 span:nth-child(2) { background: var(--orange); }
    .diff.d3 span { background: var(--red); }
    
    /* Modal */
    .modal-bg {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.95);
        z-index: 100;
        overflow-y: auto;
    }
    
    .modal-bg.open { display: block; }
    
    .modal {
        background: var(--bg2);
        max-width: 600px;
        margin: 0 auto;
        min-height: 100vh;
    }
    
    .modal-img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        background: var(--bg);
    }
    
    .modal-body { padding: 20px; }
    
    .modal-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 20px;
    }
    
    .modal-name {
        font-size: 1.6rem;
        font-weight: 700;
    }
    
    .modal-cat {
        font-size: 1rem;
        color: var(--blue);
        margin-top: 4px;
    }
    
    .close {
        background: var(--bg3);
        border: none;
        color: var(--text);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        font-size: 1.5rem;
        cursor: pointer;
    }
    
    .info-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        margin-bottom: 24px;
    }
    
    .info-box {
        background: var(--bg3);
        padding: 14px;
        border-radius: 10px;
    }
    
    .info-label {
        font-size: 0.75rem;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
    }
    
    .info-val {
        font-size: 1.05rem;
        font-weight: 500;
    }
    
    .section {
        margin-bottom: 24px;
    }
    
    .section-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--text2);
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    
    .section-text {
        font-size: 1.05rem;
        line-height: 1.7;
    }
    
    .tips {
        background: var(--bg3);
        padding: 16px;
        border-radius: 12px;
        border-left: 4px solid var(--blue);
    }
    
    .tips li {
        margin-bottom: 10px;
        font-size: 1rem;
        line-height: 1.6;
    }
    
    .tips li:last-child { margin-bottom: 0; }
    
    .facts {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    
    .fact {
        background: var(--bg3);
        padding: 12px 14px;
        border-radius: 10px;
        font-size: 0.95rem;
        color: var(--text2);
    }
    
    /* Astro panel */
    .astro {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-top: 20px;
        overflow: hidden;
    }
    
    .astro-head {
        padding: 14px 16px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    .astro-head h3 {
        font-size: 0.95rem;
        font-weight: 500;
        color: var(--text2);
    }
    
    .astro-body {
        display: none;
        padding: 16px;
        border-top: 1px solid var(--border);
    }
    
    .astro.open .astro-body { display: block; }
    
    .astro-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
    }
    
    .astro-item {
        text-align: center;
        padding: 12px;
        background: var(--bg3);
        border-radius: 10px;
    }
    
    .astro-icon { font-size: 1.5rem; margin-bottom: 6px; }
    .astro-label { font-size: 0.75rem; color: var(--text3); }
    .astro-val { font-size: 0.95rem; font-weight: 500; margin-top: 2px; }
    
    footer {
        text-align: center;
        padding: 24px;
        color: var(--text3);
        font-size: 0.85rem;
    }
    
    .loading {
        text-align: center;
        padding: 60px 20px;
        color: var(--text2);
    }
    
    @media (max-width: 500px) {
        .astro-grid { grid-template-columns: repeat(2, 1fr); }
    }
</style>

// ========== VARIABLES ==========
let lat = -32.48, lon = -58.23;
let filter = 'visible';

// ========== ASTRONOMÍA CORREGIDA ==========
function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }

function getJD(date = new Date()) {
    const y = date.getUTCFullYear();
    const m = date.getUTCMonth() + 1;
    const d = date.getUTCDate() + date.getUTCHours()/24 + date.getUTCMinutes()/1440 + date.getUTCSeconds()/86400;
    
    let Y = y, M = m;
    if (M <= 2) { Y--; M += 12; }
    
    const A = Math.floor(Y / 100);
    const B = 2 - A + Math.floor(A / 4);
    
    return Math.floor(365.25 * (Y + 4716)) + Math.floor(30.6001 * (M + 1)) + d + B - 1524.5;
}

function getLST(date, longitude) {
    const jd = getJD(date);
    const T = (jd - 2451545.0) / 36525;
    
    let gmst = 280.46061837 + 360.98564736629 * (jd - 2451545.0) + 0.000387933 * T * T - T * T * T / 38710000;
    gmst = ((gmst % 360) + 360) % 360;
    
    let lst = gmst + longitude;
    lst = ((lst % 360) + 360) % 360;
    
    return lst;
}

function getAltitude(ra, dec, date = new Date()) {
    const lst = getLST(date, lon);
    const raGrados = ra * 15;
    
    let ha = lst - raGrados;
    ha = ((ha % 360) + 360) % 360;
    if (ha > 180) ha -= 360;
    
    const haRad = toRad(ha);
    const decRad = toRad(dec);
    const latRad = toRad(lat);
    
    const sinAlt = Math.sin(decRad) * Math.sin(latRad) + Math.cos(decRad) * Math.cos(latRad) * Math.cos(haRad);
    const alt = toDeg(Math.asin(Math.max(-1, Math.min(1, sinAlt))));
    
    return alt;
}

function isVisible(obj, date = new Date()) {
    if (obj.ra === null) {
        const hour = date.getHours();
        return hour >= 20 || hour <= 5;
    }
    const alt = getAltitude(obj.ra, obj.dec, date);
    return alt > (obj.minA || 15);
}

function getVisInfo(obj) {
    const now = new Date();
    const month = now.getMonth() + 1;
    const goodMonth = obj.mo.includes(month);
    const visNow = isVisible(obj, now);
    
    let bestAlt = -90;
    let bestHour = 0;
    
    for (let h = 18; h <= 30; h++) {
        const testDate = new Date(now);
        testDate.setHours(h % 24, 0, 0, 0);
        if (h >= 24) testDate.setDate(testDate.getDate() + 1);
        
        let alt;
        if (obj.ra === null) {
            alt = 45;
        } else {
            alt = getAltitude(obj.ra, obj.dec, testDate);
        }
        
        if (alt > bestAlt) {
            bestAlt = alt;
            bestHour = h % 24;
        }
    }
    
    let startH = null, endH = null;
    for (let h = 18; h <= 30; h++) {
        const testDate = new Date(now);
        testDate.setHours(h % 24, 0, 0, 0);
        if (h >= 24) testDate.setDate(testDate.getDate() + 1);
        
        const visible = obj.ra === null ? true : getAltitude(obj.ra, obj.dec, testDate) > (obj.minA || 15);
        
        if (visible) {
            if (startH === null) startH = h % 24;
            endH = h % 24;
        }
    }
    
    const range = startH !== null ? 
        `${startH.toString().padStart(2,'0')}:00 - ${(endH+1).toString().padStart(2,'0')}:00` : 
        'No visible';
    
    let score = 0;
    if (visNow) score = 3;
    else if (goodMonth && bestAlt > 20) score = 2;
    else if (bestAlt > 0) score = 1;
    
    return { visNow, goodMonth, bestHour, bestAlt: Math.round(bestAlt), range, score };
}

// ========== RENDER ==========
function render() {
    const grid = document.getElementById('grid');
    const sortBy = document.getElementById('sort').value;
    
    let list = OBJ.map(o => ({...o, vis: getVisInfo(o)}));
    
    if (filter === 'visible') {
        list = list.filter(o => o.vis.visNow);
    } else if (filter !== 'all') {
        list = list.filter(o => o.t === filter);
    }
    
    list.sort((a, b) => {
        if (sortBy === 'vis') return b.vis.score - a.vis.score;
        if (sortBy === 'mag') return a.mag - b.mag;
        return a.n.localeCompare(b.n);
    });
    
    document.getElementById('count').textContent = `${list.length} objetos`;
    
    if (list.length === 0) {
        grid.innerHTML = '<div class="loading">No hay objetos con este filtro ahora.<br>Probá "Todos" o esperá a que oscurezca.</div>';
        return;
    }
    
    grid.innerHTML = list.map(o => `
        <div class="card" onclick="openModal('${o.id}')">
            <img class="card-img" src="${o.img}" alt="${o.n}" loading="lazy" onerror="this.style.background='#111'">
            <div class="card-body">
                <div class="card-top">
                    <div>
                        <div class="card-name">${o.n}</div>
                        <div class="card-cat">${o.cat}</div>
                    </div>
                    <span class="badge badge-${o.t}">${o.t}</span>
                </div>
                <div class="card-meta">
                    <span>📍 ${o.con}</span>
                    <span>✨ ${o.mag}</span>
                    <span>📏 ${o.dist}</span>
                </div>
                <div class="card-foot">
                    <div class="vis ${o.vis.visNow ? 'yes' : (o.vis.score >= 2 ? 'soon' : 'no')}">
                        <span class="vis-dot"></span>
                        ${o.vis.visNow ? 'Visible ahora' : (o.vis.score >= 2 ? 'Visible esta noche' : 'No visible hoy')}
                    </div>
                    <div class="diff d${o.d}"><span></span><span></span><span></span></div>
                </div>
                <div class="card-time">
                    Mejor: ${o.vis.bestHour}:00 (alt ${o.vis.bestAlt}°) · ${o.vis.range}
                </div>
            </div>
        </div>
    `).join('');
}

function openModal(id) {
    const o = OBJ.find(x => x.id === id);
    if (!o) return;
    
    const v = getVisInfo(o);
    document.getElementById('mImg').src = o.img;
    
    document.getElementById('mBody').innerHTML = `
        <div class="modal-head">
            <div>
                <div class="modal-name">${o.n}</div>
                <div class="modal-cat">${o.cat} · ${o.con}</div>
            </div>
            <button class="close" onclick="closeModal()">×</button>
        </div>
        
        <div class="info-grid">
            <div class="info-box"><div class="info-label">Magnitud</div><div class="info-val">${o.mag}</div></div>
            <div class="info-box"><div class="info-label">Distancia</div><div class="info-val">${o.dist}</div></div>
            <div class="info-box"><div class="info-label">Tamaño</div><div class="info-val">${o.sz}</div></div>
            <div class="info-box"><div class="info-label">Dificultad</div><div class="info-val">${['','Fácil','Moderado','Difícil'][o.d]}</div></div>
            <div class="info-box"><div class="info-label">Mejor hora</div><div class="info-val">${v.bestHour}:00</div></div>
            <div class="info-box"><div class="info-label">Altitud máx</div><div class="info-val">${v.bestAlt}°</div></div>
            <div class="info-box"><div class="info-label">Rango visible</div><div class="info-val">${v.range}</div></div>
            <div class="info-box"><div class="info-label">Mejores meses</div><div class="info-val">${o.mo.slice(0,4).map(m=>['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][m]).join(', ')}</div></div>
        </div>
        
        ${o.phys ? `
        <div class="section">
            <div class="section-title">Datos físicos</div>
            <div class="info-grid">
                ${Object.entries(o.phys).map(([k,val]) => `
                    <div class="info-box"><div class="info-label">${k}</div><div class="info-val">${val}</div></div>
                `).join('')}
            </div>
        </div>
        ` : ''}
        
        <div class="section">
            <div class="section-title">Descripción</div>
            <div class="section-text">${o.desc}</div>
        </div>
        
        <div class="section">
            <div class="section-title">🔭 Tips para Celestron 127</div>
            <ul class="tips">
                ${o.tips.map(t => `<li>${t}</li>`).join('')}
            </ul>
        </div>
        
        <div class="section">
            <div class="section-title">💡 Datos curiosos</div>
            <div class="facts">
                ${o.facts.map(f => `<div class="fact">${f}</div>`).join('')}
            </div>
        </div>
    `;
    
    document.getElementById('modal').classList.add('open');
}

function closeModal() {
    document.getElementById('modal').classList.remove('open');
}

// ========== FILTROS ==========
document.getElementById('filters').onclick = e => {
    if (e.target.classList.contains('filter')) {
        document.querySelectorAll('.filter').forEach(f => f.classList.remove('active'));
        e.target.classList.add('active');
        filter = e.target.dataset.f;
        render();
    }
};

// ========== UBICACIÓN ==========
function getLoc() {
    if (navigator.geolocation) {
        document.getElementById('loc').textContent = '📍 Obteniendo...';
        navigator.geolocation.getCurrentPosition(
            pos => {
                lat = pos.coords.latitude;
                lon = pos.coords.longitude;
                document.getElementById('loc').textContent = `📍 ${lat.toFixed(2)}°, ${lon.toFixed(2)}°`;
                
                fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
                    .then(r => r.json())
                    .then(d => {
                        const city = d.address?.city || d.address?.town || d.address?.village || '';
                        if (city) document.getElementById('loc').textContent = `📍 ${city}`;
                    }).catch(() => {});
                
                render();
                updateAstro();
            },
            () => {
                document.getElementById('loc').textContent = '📍 C. del Uruguay (default)';
                render();
            }
        );
    }
}

// ========== RELOJ ==========
function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
}

// ========== ASTRO ==========
function getMoonPhase() {
    const d = new Date();
    const lp = 2551443;
    const now = d.getTime() / 1000;
    const newMoon = 592500;
    const phase = ((now - newMoon) % lp) / lp;
    
    if (phase < 0.03 || phase > 0.97) return {n:'Nueva',i:'🌑',p:0};
    if (phase < 0.22) return {n:'Creciente',i:'🌒',p:Math.round(phase*4*100)};
    if (phase < 0.28) return {n:'Cuarto Crec.',i:'🌓',p:50};
    if (phase < 0.47) return {n:'Gibosa Crec.',i:'🌔',p:Math.round(50+(phase-0.25)*200)};
    if (phase < 0.53) return {n:'Llena',i:'🌕',p:100};
    if (phase < 0.72) return {n:'Gibosa Meng.',i:'🌖',p:Math.round(100-(phase-0.5)*200)};
    if (phase < 0.78) return {n:'Cuarto Meng.',i:'🌗',p:50};
    return {n:'Menguante',i:'🌘',p:Math.round((1-phase)*4*100)};
}

function updateAstro() {
    const m = getMoonPhase();
    document.getElementById('astroBody').innerHTML = `
        <div class="astro-grid">
            <div class="astro-item">
                <div class="astro-icon">${m.i}</div>
                <div class="astro-label">Luna</div>
                <div class="astro-val">${m.n}</div>
            </div>
            <div class="astro-item">
                <div class="astro-icon">💡</div>
                <div class="astro-label">Iluminación</div>
                <div class="astro-val">${m.p}%</div>
            </div>
            <div class="astro-item">
                <div class="astro-icon">${m.p < 30 ? '🌟' : '😐'}</div>
                <div class="astro-label">Cielo</div>
                <div class="astro-val">${m.p < 30 ? 'Excelente' : (m.p < 60 ? 'Bueno' : 'Regular')}</div>
            </div>
        </div>
    `;
}

// ========== INIT ==========
document.addEventListener('DOMContentLoaded', () => {
    getLoc();
    updateClock();
    updateAstro();
    setInterval(updateClock, 60000);
    setInterval(render, 300000);
});

document.getElementById('modal').onclick = e => {
    if (e.target.id === 'modal') closeModal();
};
document.onkeydown = e => { if (e.key === 'Escape') closeModal(); };
</script>
