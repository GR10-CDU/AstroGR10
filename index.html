    :root {
        --bg: #0d1117;
        --bg2: #161b22;
        --bg3: #21262d;
        --border: #30363d;
        --text: #e6edf3;
        --text2: #8b949e;
        --text3: #6e7681;
        --blue: #58a6ff;
        --green: #3fb950;
        --orange: #d29922;
        --red: #f85149;
        --purple: #a371f7;
    }
    
    body {
        font-family: 'Inter', -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        min-height: 100vh;
    }
    
    .app { max-width: 1000px; margin: 0 auto; padding: 12px; }
    
    /* Header Compacto */
    header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
        gap: 8px;
    }
    
    .logo { font-size: 1.3rem; font-weight: 700; color: var(--blue); }
    
    .location {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.85rem;
        color: var(--text2);
    }
    
    .location svg { width: 14px; height: 14px; fill: var(--orange); }
    
    .coords {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.75rem;
        color: var(--text3);
        margin-left: 4px;
    }
    
    .header-right {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .time {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.9rem;
    }
    
    .btn {
        background: var(--bg3);
        border: 1px solid var(--border);
        color: var(--text2);
        padding: 5px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.8rem;
    }
    
    .btn:hover { background: var(--border); color: var(--text); }
    
    /* Filtros */
    .filters {
        display: flex;
        gap: 6px;
        margin-bottom: 12px;
        flex-wrap: wrap;
    }
    
    .filter {
        background: var(--bg2);
        border: 1px solid var(--border);
        color: var(--text2);
        padding: 6px 12px;
        border-radius: 16px;
        cursor: pointer;
        font-size: 0.8rem;
        transition: all 0.15s;
    }
    
    .filter:hover { border-color: var(--blue); }
    .filter.active { background: var(--blue); border-color: var(--blue); color: #fff; }
    
    /* Controles */
    .controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        font-size: 0.85rem;
        color: var(--text2);
    }
    
    .sort {
        background: var(--bg2);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 0.8rem;
    }
    
    /* Grid */
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 12px;
    }
    
    /* Cards */
    .card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        cursor: pointer;
        transition: all 0.2s;
    }
    
    .card:hover {
        border-color: var(--blue);
        transform: translateY(-2px);
    }
    
    .card-img {
        width: 100%;
        height: 130px;
        object-fit: cover;
        background: var(--bg3);
    }
    
    .card-body { padding: 10px 12px; }
    
    .card-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 6px;
    }
    
    .card-title { font-size: 0.95rem; font-weight: 600; }
    
    .card-cat {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.7rem;
        color: var(--blue);
    }
    
    .tag {
        font-size: 0.7rem;
        padding: 2px 6px;
        border-radius: 4px;
        font-weight: 500;
    }
    
    .tag-planeta { background: #d2992220; color: var(--orange); }
    .tag-nebulosa { background: #a371f720; color: var(--purple); }
    .tag-galaxia { background: #58a6ff20; color: var(--blue); }
    .tag-cumulo { background: #3fb95020; color: var(--green); }
    .tag-estrella { background: #f8514920; color: var(--red); }
    
    .card-meta {
        display: flex;
        gap: 12px;
        font-size: 0.75rem;
        color: var(--text2);
        margin-bottom: 8px;
    }
    
    .card-foot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 8px;
        border-top: 1px solid var(--border);
    }
    
    .vis {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 0.75rem;
        font-weight: 500;
    }
    
    .vis.yes { color: var(--green); }
    .vis.soon { color: var(--orange); }
    .vis.no { color: var(--text3); }
    
    .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
    }
    
    .yes .dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .soon .dot { background: var(--orange); }
    .no .dot { background: var(--text3); }
    
    .best-time {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.7rem;
        color: var(--text3);
    }
    
    .diff {
        display: flex;
        gap: 2px;
    }
    
    .diff span {
        width: 3px;
        height: 10px;
        background: var(--border);
        border-radius: 1px;
    }
    
    .diff.d1 span:nth-child(1) { background: var(--green); }
    .diff.d2 span:nth-child(1), .diff.d2 span:nth-child(2) { background: var(--orange); }
    .diff.d3 span { background: var(--red); }
    
    /* Modal */
    .modal-bg {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.85);
        z-index: 100;
        overflow-y: auto;
        padding: 20px;
    }
    
    .modal-bg.open { display: flex; justify-content: center; align-items: flex-start; }
    
    .modal {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 12px;
        max-width: 700px;
        width: 100%;
        margin: 20px auto;
        overflow: hidden;
    }
    
    .modal-img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        background: var(--bg);
    }
    
    .modal-content { padding: 20px; }
    
    .modal-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 16px;
    }
    
    .modal-title { font-size: 1.4rem; font-weight: 700; }
    
    .modal-sub {
        font-family: 'IBM Plex Mono', monospace;
        color: var(--blue);
        font-size: 0.85rem;
        margin-top: 4px;
    }
    
    .close-btn {
        background: var(--bg3);
        border: none;
        color: var(--text2);
        width: 32px;
        height: 32px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 1.1rem;
    }
    
    .close-btn:hover { background: var(--border); }
    
    .info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 10px;
        margin-bottom: 16px;
    }
    
    .info-item {
        background: var(--bg3);
        padding: 10px;
        border-radius: 6px;
    }
    
    .info-label {
        font-size: 0.65rem;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 3px;
    }
    
    .info-value {
        font-size: 0.9rem;
        font-weight: 500;
    }
    
    .info-value.mono { font-family: 'IBM Plex Mono', monospace; }
    
    .section { margin-bottom: 16px; }
    
    .section-title {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--text2);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
    }
    
    .section-text {
        font-size: 0.9rem;
        color: var(--text);
        line-height: 1.7;
    }
    
    .tips {
        background: var(--bg3);
        padding: 14px;
        border-radius: 8px;
        border-left: 3px solid var(--blue);
    }
    
    .tips li {
        margin-bottom: 6px;
        padding-left: 6px;
        font-size: 0.85rem;
    }
    
    .tips li:last-child { margin-bottom: 0; }
    
    .facts {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }
    
    .fact {
        background: var(--bg3);
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 0.8rem;
        color: var(--text2);
    }
    
    /* Panel astronómico */
    .astro-panel {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-top: 16px;
    }
    
    .astro-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 14px;
        cursor: pointer;
    }
    
    .astro-head h3 {
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--text2);
    }
    
    .astro-toggle { color: var(--text3); font-size: 0.75rem; }
    
    .astro-body {
        display: none;
        padding: 14px;
        border-top: 1px solid var(--border);
    }
    
    .astro-panel.open .astro-body { display: block; }
    
    .astro-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 10px;
    }
    
    .astro-item {
        text-align: center;
        padding: 10px;
        background: var(--bg3);
        border-radius: 6px;
    }
    
    .astro-icon { font-size: 1.3rem; margin-bottom: 4px; }
    .astro-label { font-size: 0.7rem; color: var(--text3); }
    .astro-val { font-size: 0.85rem; font-weight: 500; }
    
    footer {
        text-align: center;
        padding: 16px;
        color: var(--text3);
        font-size: 0.75rem;
    }
    
    .loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px;
        gap: 12px;
    }
    
    .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--border);
        border-top-color: var(--blue);
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    @media (max-width: 600px) {
        header { flex-direction: column; align-items: flex-start; }
        .header-right { width: 100%; justify-content: space-between; }
        .grid { grid-template-columns: 1fr; }
    }
</style>

// === VARIABLES GLOBALES ===
let lat = -32.48, lon = -58.23, locName = 'Concepción del Uruguay';
let filter = 'visible', sortBy = 'visibility';

// === FUNCIONES ASTRONÓMICAS ===
function jd(d=new Date()) {
    const y=d.getUTCFullYear(), m=d.getUTCMonth()+1, day=d.getUTCDate()+d.getUTCHours()/24+d.getUTCMinutes()/1440;
    const a=Math.floor((14-m)/12), y2=y+4800-a, m2=m+12*a-3;
    return day+Math.floor((153*m2+2)/5)+365*y2+Math.floor(y2/4)-Math.floor(y2/100)+Math.floor(y2/400)-32045;
}

function lst(d,lng) {
    const t=(jd(d)-2451545)/36525;
    let g=280.46061837+360.98564736629*(jd(d)-2451545)+0.000387933*t*t;
    g=((g%360)+360)%360;
    return (((g+lng)%360)+360)%360/15;
}

function altAz(ra,dec,d=new Date()) {
    const ha=(lst(d,lon)-ra)*15, haR=ha*Math.PI/180, decR=dec*Math.PI/180, latR=lat*Math.PI/180;
    const sinAlt=Math.sin(decR)*Math.sin(latR)+Math.cos(decR)*Math.cos(latR)*Math.cos(haR);
    return Math.asin(sinAlt)*180/Math.PI;
}

function isVis(obj, d=new Date()) {
    return altAz(obj.ra, obj.dec, d) > (obj.minAlt||15);
}

function getVisInfo(obj) {
    const now=new Date(), month=now.getMonth()+1;
    const goodMonth = obj.months.includes(month);
    const visNow = isVis(obj);
    
    // Calcular mejor hora
    let bestAlt=-90, bestHour=0;
    for(let h=18; h<30; h++) {
        const t=new Date(now); t.setHours(h%24,0,0,0);
        if(h>=24) t.setDate(t.getDate()+1);
        const alt=altAz(obj.ra,obj.dec,t);
        if(alt>bestAlt) { bestAlt=alt; bestHour=h%24; }
    }
    
    // Calcular rango visible
    let start=null, end=null;
    for(let h=18; h<30; h++) {
        const t=new Date(now); t.setHours(h%24,0,0,0);
        if(h>=24) t.setDate(t.getDate()+1);
        if(altAz(obj.ra,obj.dec,t) > (obj.minAlt||15)) {
            if(!start) start=h%24;
            end=h%24;
        }
    }
    
    return {
        visNow,
        goodMonth,
        bestHour,
        bestAlt: Math.round(bestAlt),
        range: start!==null ? `${start.toString().padStart(2,'0')}:00 - ${end.toString().padStart(2,'0')}:00` : 'No visible',
        score: visNow ? 3 : (goodMonth && bestAlt>20 ? 2 : (bestAlt>0 ? 1 : 0))
    };
}

// === RENDER ===
function renderObjects() {
    const grid = document.getElementById('grid');
    sortBy = document.getElementById('sortSel').value;
    
    let list = objects.map(o => ({...o, vis: getVisInfo(o)}));
    
    // Filtrar
    if(filter === 'visible') list = list.filter(o => o.vis.visNow);
    else if(filter !== 'all') list = list.filter(o => o.type === filter);
    
    // Ordenar
    list.sort((a,b) => {
        if(sortBy === 'visibility') return b.vis.score - a.vis.score;
        if(sortBy === 'magnitude') return a.mag - b.mag;
        if(sortBy === 'difficulty') return a.diff - b.diff;
        return a.name.localeCompare(b.name);
    });
    
    document.getElementById('count').textContent = `${list.length} objetos`;
    
    if(list.length === 0) {
        grid.innerHTML = '<div class="loading"><span>No hay objetos visibles con este filtro</span></div>';
        return;
    }
    
    grid.innerHTML = list.map(o => `
        <div class="card" onclick="openModal('${o.id}')">
            <img class="card-img" src="${o.img}" alt="${o.name}" loading="lazy" onerror="this.style.display='none'">
            <div class="card-body">
                <div class="card-head">
                    <div>
                        <div class="card-title">${o.name}</div>
                        <div class="card-cat">${o.cat}</div>
                    </div>
                    <span class="tag tag-${o.type}">${o.type}</span>
                </div>
                <div class="card-meta">
                    <span>📍 ${o.con}</span>
                    <span>✨ mag ${o.mag}</span>
                    <span>📏 ${o.dist}</span>
                </div>
                <div class="card-foot">
                    <div class="vis ${o.vis.visNow ? 'yes' : (o.vis.goodMonth ? 'soon' : 'no')}">
                        <span class="dot"></span>
                        ${o.vis.visNow ? 'Visible ahora' : (o.vis.goodMonth ? 'Visible esta noche' : 'No visible')}
                    </div>
                    <div class="diff d${o.diff}"><span></span><span></span><span></span></div>
                </div>
                <div class="best-time" style="margin-top:6px;font-size:0.7rem;color:var(--text3)">
                    Mejor: ${o.vis.bestHour}:00 (alt ${o.vis.bestAlt}°) · ${o.vis.range}
                </div>
            </div>
        </div>
    `).join('');
}

function openModal(id) {
    const o = objects.find(x => x.id === id);
    if(!o) return;
    
    const vis = getVisInfo(o);
    document.getElementById('modalImg').src = o.img;
    
    document.getElementById('modalContent').innerHTML = `
        <div class="modal-head">
            <div>
                <div class="modal-title">${o.name}</div>
                <div class="modal-sub">${o.cat} · ${o.con}</div>
            </div>
            <button class="close-btn" onclick="closeModal()">&times;</button>
        </div>
        
        <div class="info-grid">
            <div class="info-item"><div class="info-label">Magnitud</div><div class="info-value">${o.mag}</div></div>
            <div class="info-item"><div class="info-label">Distancia</div><div class="info-value">${o.dist}</div></div>
            <div class="info-item"><div class="info-label">Tamaño</div><div class="info-value">${o.size}</div></div>
            <div class="info-item"><div class="info-label">Dificultad</div><div class="info-value">${['','Fácil','Moderado','Difícil'][o.diff]}</div></div>
            <div class="info-item"><div class="info-label">Mejor hora</div><div class="info-value mono">${vis.bestHour}:00</div></div>
            <div class="info-item"><div class="info-label">Altitud máx</div><div class="info-value">${vis.bestAlt}°</div></div>
            <div class="info-item"><div class="info-label">Rango visible</div><div class="info-value mono">${vis.range}</div></div>
            <div class="info-item"><div class="info-label">Mejores meses</div><div class="info-value">${o.months.map(m=>['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][m]).join(', ')}</div></div>
        </div>
        
        ${o.physical ? `
        <div class="section">
            <div class="section-title">Datos físicos</div>
            <div class="info-grid">
                ${Object.entries(o.physical).map(([k,v]) => `
                    <div class="info-item"><div class="info-label">${k}</div><div class="info-value">${v}</div></div>
                `).join('')}
            </div>
        </div>
        ` : ''}
        
        <div class="section">
            <div class="section-title">Descripción</div>
            <div class="section-text">${o.desc}</div>
        </div>
        
        <div class="section">
            <div class="section-title">🔭 Tips de observación para Celestron 127</div>
            <ul class="tips">
                ${o.tips.map(t => `<li>${t}</li>`).join('')}
            </ul>
        </div>
        
        <div class="section">
            <div class="section-title">💡 Datos curiosos</div>
            <div class="facts">
                ${o.facts.map(f => `<span class="fact">${f}</span>`).join('')}
            </div>
        </div>
    `;
    
    document.getElementById('modalBg').classList.add('open');
}

function closeModal(e) {
    if(!e || e.target.id === 'modalBg') {
        document.getElementById('modalBg').classList.remove('open');
    }
}

// === FILTROS ===
document.getElementById('filters').addEventListener('click', e => {
    if(e.target.classList.contains('filter')) {
        document.querySelectorAll('.filter').forEach(f => f.classList.remove('active'));
        e.target.classList.add('active');
        filter = e.target.dataset.f;
        renderObjects();
    }
});

// === UBICACIÓN ===
function getLocation() {
    if(navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            lat = pos.coords.latitude;
            lon = pos.coords.longitude;
            document.getElementById('locCoords').textContent = `${lat.toFixed(2)}°, ${lon.toFixed(2)}°`;
            
            // Reverse geocoding
            fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
                .then(r => r.json())
                .then(d => {
                    locName = d.address?.city || d.address?.town || d.address?.village || 'Tu ubicación';
                    document.getElementById('locName').textContent = locName;
                })
                .catch(() => {
                    document.getElementById('locName').textContent = 'Ubicación obtenida';
                });
            
            renderObjects();
            updateAstro();
        }, () => {
            document.getElementById('locName').textContent = 'GPS no disponible';
            renderObjects();
        });
    }
}

// === RELOJ ===
function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
}

// === PANEL ASTRONÓMICO ===
function toggleAstro() {
    document.getElementById('astroPanel').classList.toggle('open');
}

function getMoonPhase() {
    const d = new Date();
    const lp = 2551443; // Lunar period in seconds
    const now = d.getTime() / 1000;
    const newMoon = 592500; // Known new moon
    const phase = ((now - newMoon) % lp) / lp;
    
    if(phase < 0.03 || phase > 0.97) return {name: 'Nueva', icon: '🌑', illum: 0};
    if(phase < 0.22) return {name: 'Creciente', icon: '🌒', illum: Math.round(phase*4*100)};
    if(phase < 0.28) return {name: 'Cuarto Creciente', icon: '🌓', illum: 50};
    if(phase < 0.47) return {name: 'Gibosa Creciente', icon: '🌔', illum: Math.round(50+(phase-0.25)*200)};
    if(phase < 0.53) return {name: 'Llena', icon: '🌕', illum: 100};
    if(phase < 0.72) return {name: 'Gibosa Menguante', icon: '🌖', illum: Math.round(100-(phase-0.5)*200)};
    if(phase < 0.78) return {name: 'Cuarto Menguante', icon: '🌗', illum: 50};
    return {name: 'Menguante', icon: '🌘', illum: Math.round((1-phase)*4*100)};
}

function updateAstro() {
    const moon = getMoonPhase();
    const now = new Date();
    const sunset = new Date(now); sunset.setHours(18,30,0);
    const sunrise = new Date(now); sunrise.setHours(6,45,0);
    
    document.getElementById('astroGrid').innerHTML = `
        <div class="astro-item">
            <div class="astro-icon">${moon.icon}</div>
            <div class="astro-label">Fase lunar</div>
            <div class="astro-val">${moon.name}</div>
        </div>
        <div class="astro-item">
            <div class="astro-icon">💡</div>
            <div class="astro-label">Iluminación</div>
            <div class="astro-val">${moon.illum}%</div>
        </div>
        <div class="astro-item">
            <div class="astro-icon">🌅</div>
            <div class="astro-label">Puesta del sol</div>
            <div class="astro-val">~18:30</div>
        </div>
        <div class="astro-item">
            <div class="astro-icon">🌄</div>
            <div class="astro-label">Salida del sol</div>
            <div class="astro-val">~06:45</div>
        </div>
        <div class="astro-item">
            <div class="astro-icon">${moon.illum < 30 ? '🌟' : '😐'}</div>
            <div class="astro-label">Condiciones</div>
            <div class="astro-val">${moon.illum < 30 ? 'Excelentes' : (moon.illum < 60 ? 'Buenas' : 'Regular')}</div>
        </div>
        <div class="astro-item">
            <div class="astro-icon">🔭</div>
            <div class="astro-label">Ventana óptima</div>
            <div class="astro-val">21:00-03:00</div>
        </div>
    `;
}

// === INIT ===
document.addEventListener('DOMContentLoaded', () => {
    getLocation();
    updateClock();
    updateAstro();
    setInterval(updateClock, 60000);
    setInterval(() => { renderObjects(); }, 300000); // Actualizar cada 5 min
});

// Cerrar modal con ESC
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });
